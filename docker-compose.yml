services:
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: time_persona
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - hackathon_postgres_data:/var/lib/postgresql/data

volumes:
  hackathon_postgres_data:
