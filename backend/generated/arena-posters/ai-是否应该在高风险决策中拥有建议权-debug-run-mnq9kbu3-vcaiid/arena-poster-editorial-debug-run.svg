    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(216 1216) rotate(90) scale(352 192)">
      <stop stop-color="#ffffff" stop-opacity="0.14"/>
