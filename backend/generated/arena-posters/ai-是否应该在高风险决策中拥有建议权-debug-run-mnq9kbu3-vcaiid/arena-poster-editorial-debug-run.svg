  <text x="110" y="490" fill="#475569" font-size="28" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif"><tspan x="110" dy="0">AI</tspan><tspan x="110" dy="38">可以参与高风险决策辅助，但不能脱离人</tspan><tspan x="110" dy="38">工签字、过程留痕与责任归属。</tspan></text>
  <text x="110" y="494" fill="#475569" font-size="22" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace">SUMMARY / 真正的争论不是让不让 AI 说话，而是谁为它的话负责。</text>
