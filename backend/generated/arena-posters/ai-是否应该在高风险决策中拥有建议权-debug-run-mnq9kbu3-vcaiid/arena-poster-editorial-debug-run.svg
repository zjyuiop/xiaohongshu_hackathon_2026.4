  <text x="1090" y="494" fill="#475569" font-size="20" text-anchor="end" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace">PROMPT / 围绕“AI 是否应该在高风险决策中拥有建议权”的跨时空人格讨论海报，突出冲突、判断、成长与决断感。</text>
